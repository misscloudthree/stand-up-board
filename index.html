<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>站會看板 · Standup Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">▣</span>
      <h1>站會看板</h1>
    </div>

    <div class="board-clock">
      <span class="clock-label"><span class="clock-live-dot" aria-hidden="true"></span>TODAY</span>
      <span class="clock-date" id="todayDate">--</span>
      <span class="clock-time" id="todayTime">--:--</span>
    </div>

    <nav class="tabs" id="tabNav">
      <button data-tab="backlog" class="tab-btn active">Backlog 追蹤</button>
      <button data-tab="modules" class="tab-btn">模組管理</button>
      <button data-tab="daily" class="tab-btn">每日測試追蹤</button>
      <button data-tab="testing" class="tab-btn">交付測試追蹤</button>
    </nav>

    <button class="icon-btn" id="settingsBtn" title="設定" aria-label="設定">⚙</button>
  </header>

  <div id="configWarning" class="config-warning hidden">
    <strong>尚未設定 GitHub 連線資訊</strong>
    <p>請先編輯 <code>config.js</code> 填入 GitHub 帳號與 repo 名稱，並在右上角「設定」輸入你的 Personal Access Token。詳細步驟請參考 README.md。</p>
  </div>

  <main id="mainContent">

    <section id="backlogView" class="tab-view active">
      <div class="toolbar">
        <button class="btn-primary" id="addBacklogBtn">＋ 新增 Backlog</button>

        <div class="filter-group" id="statusFilterGroup">
          <label class="filter-toggle"><input type="checkbox" class="status-filter-cb" value="pending" checked>待處理</label>
          <label class="filter-toggle"><input type="checkbox" class="status-filter-cb" value="doing" checked>進行中</label>
          <label class="filter-toggle"><input type="checkbox" class="status-filter-cb" value="done">已完成</label>
          <label class="filter-toggle"><input type="checkbox" class="status-filter-cb" value="void">作廢</label>
        </div>

        <label class="date-field">
          類型
          <select id="filterCategory"><option value="">全部類型</option></select>
        </label>

        <label class="date-field">
          負責人
          <select id="filterOwner"><option value="">全部負責人</option></select>
        </label>

        <label class="date-field">
          排序
          <select id="sortDeadline">
            <option value="asc">Deadline 近到遠</option>
            <option value="desc">Deadline 遠到近</option>
          </select>
        </label>

        <button class="btn-ghost" id="refreshBacklogBtn">重新整理</button>
        <span class="status-msg" id="backlogStatusMsg"></span>
      </div>
      <div class="board-columns" id="backlogColumns">
        <div class="empty-hint">載入中…</div>
      </div>
    </section>

    <section id="modulesView" class="tab-view">
      <div class="module-panel">
        <div class="module-panel-title">FSD 模組 / 負責人管理</div>
        <div class="module-list" id="moduleList"></div>
        <form id="addModuleForm" class="inline-form">
          <input type="text" id="newModuleName" placeholder="模組名稱（例如：前台顯示）" required>
          <input type="text" id="newModuleOwners" placeholder="負責人（多人可用、分隔）">
          <button type="submit" class="btn-primary">新增模組</button>
        </form>
        <span class="status-msg" id="moduleStatusMsg"></span>
      </div>
    </section>

    <section id="dailyView" class="tab-view">
      <details class="field-drawer" id="fieldDrawer">
        <summary>追蹤項目設定</summary>
        <div class="field-manage">
          <div class="module-list" id="fieldList"></div>
          <form id="addFieldForm" class="inline-form">
            <input type="text" id="newFieldLabel" placeholder="追蹤項目名稱（例如：漏測數量）" required>
            <button type="submit" class="btn-primary">新增項目</button>
          </form>
          <span class="status-msg" id="fieldStatusMsg"></span>
        </div>
      </details>

      <div class="toolbar">
        <label class="date-field">
          日期
          <input type="date" id="dailyDatePicker">
        </label>
        <button class="btn-ghost" id="refreshDailyBtn">重新整理</button>
        <span class="status-msg" id="dailyStatusMsg"></span>
      </div>

      <div class="table-wrap">
        <table class="daily-table">
          <thead>
            <tr id="dailyTableHead">
              <th>模組</th>
              <th>負責人</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="dailyTableBody">
            <tr><td colspan="3" class="empty-hint">載入中…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="summary-panel">
        <div class="summary-title">今日 Summary（所有模組加總）</div>
        <div class="summary-board" id="summaryBoard"></div>
      </div>
    </section>

    <section id="testingView" class="tab-view">
      <div class="toolbar">
        <button class="btn-ghost" id="downloadTemplateBtn">下載 Excel 範本</button>
        <input type="file" id="uploadExcelInput" accept=".xlsx" class="hidden">
        <button class="btn-primary" id="uploadExcelBtn">上傳 Excel 更新</button>
        <button class="btn-ghost" id="refreshTestingBtn">重新整理</button>
        <span class="status-msg" id="testingStatusMsg"></span>
      </div>

      <div id="uploadErrors" class="upload-errors hidden"></div>

      <details class="field-drawer" id="phaseDrawer">
        <summary>測試階段設定</summary>
        <div class="field-manage">
          <div class="form-row">
            <label>全域預設「基本測試天數」（單一功能項目未個別設定時使用）</label>
            <input type="number" min="0" id="defaultTestDaysInput" class="num-input" style="width:100px">
          </div>
          <div class="table-wrap">
            <table class="daily-table">
              <thead>
                <tr>
                  <th>交付階段</th>
                  <th>FT 預計完成日</th>
                  <th>SIT 預計完成日</th>
                </tr>
              </thead>
              <tbody id="phaseSettingsBody">
                <tr><td colspan="3" class="empty-hint">尚未載入資料</td></tr>
              </tbody>
            </table>
          </div>
          <div class="form-actions" style="margin-top:14px;">
            <button type="button" class="btn-primary" id="savePhaseSettingsBtn">儲存階段設定</button>
          </div>
          <span class="status-msg" id="phaseStatusMsg"></span>
        </div>
      </details>

      <div class="overview-grid" id="testingOverview">
        <div class="empty-hint">載入中…</div>
      </div>
    </section>

  </main>
</div>

<div id="overlayRoot"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
